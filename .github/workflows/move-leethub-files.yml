name: Move LeetHub Files

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  move-leethub-files:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug root folders
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          echo "== ROOT DIRS =="
          for path in */; do
            dir="${path%/}"
            echo "[DIR] $dir"

            if [[ -f "$dir/README.md" ]]; then
              echo "  - README.md: yes"
              echo "  - README first 20 lines:"
              sed -n '1,20p' "$dir/README.md" || true
            else
              echo "  - README.md: no"
            fi
          done

      - name: Move root LeetHub folders into leetcode by difficulty (relaxed mode)
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p leetcode/easy leetcode/medium leetcode/hard leetcode/unknown
          shopt -s nullglob

          moved=0

          for path in */; do
            dir="${path%/}"

            case "$dir" in
              .git|.github|leetcode|백준|baekjoon|programmers|프로그래머스|swea|goorm|구름|src|docs|scripts|assets|test|tests)
                echo "Skip excluded dir: $dir"
                continue
                ;;
            esac

            # README 없으면 skip
            if [[ ! -f "$dir/README.md" ]]; then
              echo "Skip no README: $dir"
              continue
            fi

            # LeetCode 흔적이 README 안에 있으면 대상
            if grep -qiE 'leetcode\.com/problems/|#\s*.*LeetCode|LeetCode' "$dir/README.md"; then
              :
            else
              echo "Skip not leetcode README: $dir"
              continue
            fi

            target_base="leetcode/unknown"

            # 난이도 판별 완화
            if grep -qiE 'easy' "$dir/README.md"; then
              target_base="leetcode/easy"
            elif grep -qiE 'medium' "$dir/README.md"; then
              target_base="leetcode/medium"
            elif grep -qiE 'hard' "$dir/README.md"; then
              target_base="leetcode/hard"
            fi

            target_dir="$target_base/$dir"

            echo "Move: $dir -> $target_dir"

            if [[ -d "$target_dir" ]]; then
              echo "Overwrite existing: $target_dir"
              rm -rf "$target_dir"
              git add -A
            fi

            git mv "$dir" "$target_dir" 2>/dev/null || mv "$dir" "$target_dir"
            moved=1
          done

          if [[ "$moved" -eq 0 ]]; then
            echo "No LeetHub folders matched."
          fi

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: organize LeetHub problems by difficulty"
          git push
