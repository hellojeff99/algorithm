name: Move LeetHub Files

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  relocate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move LeetHub-generated folders into leetcode/
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p leetcode

          shopt -s nullglob

          moved=0

          for path in */; do
            dir="${path%/}"

            # .github, leetcode, 기타 숨김/시스템 폴더 제외
            case "$dir" in
              .git|.github|leetcode)
                continue
                ;;
            esac

            # LeetHub가 만드는 문제 폴더 패턴만 이동
            # 예: "1. Two Sum", "0001-two-sum", "Two Sum" 등
            # 필요하면 여기 조건을 더 좁히시면 됩니다.
            if [[ -f "$dir/README.md" ]] || compgen -G "$dir/*.*" > /dev/null; then
              if [[ ! -e "leetcode/$dir" ]]; then
                git mv "$dir" "leetcode/$dir"
                moved=1
              fi
            fi
          done

          if [[ "$moved" -eq 0 ]]; then
            echo "No folders moved."
          fi

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "chore: move LeetHub files into /leetcode"
          git push
