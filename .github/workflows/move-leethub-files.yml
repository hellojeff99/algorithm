name: Move LeetHub Files

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  move-leethub-files:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move root LeetHub folders into leetcode (overwrite mode)
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p leetcode
          shopt -s nullglob

          moved=0

          for path in */; do
            dir="${path%/}"

            # 제외할 루트 폴더
            case "$dir" in
              .git|.github|leetcode|백준|baekjoon|programmers|프로그래머스|swea|goorm|구름|src|docs|scripts|assets|test|tests)
                continue
                ;;
            esac

            # 숫자로 시작하는 폴더만 대상
            [[ "$dir" =~ ^[0-9] ]] || continue

            # README 존재 확인
            [[ -f "$dir/README.md" ]] || continue

            # LeetCode 문제 링크 확인
            grep -qi 'leetcode\.com/problems/' "$dir/README.md" || continue

            echo "Processing $dir"

            # 기존 폴더 있으면 삭제 (overwrite)
            if [[ -d "leetcode/$dir" ]]; then
              echo "Overwrite: removing leetcode/$dir"
              git rm -r "leetcode/$dir" || true
            fi

            git mv "$dir" "leetcode/$dir"
            moved=1
          done

          if [[ "$moved" -eq 0 ]]; then
            echo "No LeetHub folders matched."
          fi

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: sync LeetHub problems into leetcode (overwrite)"
          git push
