name: Move LeetHub Files

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  move-leethub-files:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move root LeetHub folders into leetcode by difficulty
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p leetcode/easy leetcode/medium leetcode/hard leetcode/unknown
          shopt -s nullglob

          moved=0

          for path in */; do
            dir="${path%/}"

            case "$dir" in
              .git|.github|leetcode|백준|baekjoon|programmers|프로그래머스|swea|goorm|구름|src|docs|scripts|assets|test|tests)
                continue
                ;;
            esac

            [[ -f "$dir/README.md" ]] || continue
            grep -qiE 'leetcode\.com/problems/|LeetCode' "$dir/README.md" || continue

            target_base="leetcode/unknown"

            if grep -qiE '(^|[^a-zA-Z])easy([^a-zA-Z]|$)' "$dir/README.md"; then
              target_base="leetcode/easy"
            elif grep -qiE '(^|[^a-zA-Z])medium([^a-zA-Z]|$)' "$dir/README.md"; then
              target_base="leetcode/medium"
            elif grep -qiE '(^|[^a-zA-Z])hard([^a-zA-Z]|$)' "$dir/README.md"; then
              target_base="leetcode/hard"
            fi

            target_dir="$target_base/$dir"

            echo "Processing: $dir -> $target_dir"

            if [[ -e "$target_dir" ]]; then
              echo "Overwrite existing: $target_dir"
              rm -rf "$target_dir"
              git add -A
            fi

            git mv "$dir" "$target_dir" 2>/dev/null || mv "$dir" "$target_dir"
            moved=1
          done

          if [[ "$moved" -eq 0 ]]; then
            echo "No LeetHub folders matched."
          fi

      - name: Generate leetcode README
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p leetcode

          total=0
          easy_count=0
          medium_count=0
          hard_count=0
          unknown_count=0

          for diff in easy medium hard unknown; do
            if [[ -d "leetcode/$diff" ]]; then
              count=$(find "leetcode/$diff" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
            else
              count=0
            fi

            case "$diff" in
              easy) easy_count="$count" ;;
              medium) medium_count="$count" ;;
              hard) hard_count="$count" ;;
              unknown) unknown_count="$count" ;;
            esac

            total=$((total + count))
          done

          {
            echo "# LeetCode Solutions"
            echo
            echo "- Total: $total"
            echo "- Easy: $easy_count"
            echo "- Medium: $medium_count"
            echo "- Hard: $hard_count"
            if [[ "$unknown_count" -gt 0 ]]; then
              echo "- Unknown: $unknown_count"
            fi
            echo

            for diff in easy medium hard unknown; do
              [[ -d "leetcode/$diff" ]] || continue

              count=$(find "leetcode/$diff" -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')
              [[ "$count" -gt 0 ]] || continue

              title="$(tr '[:lower:]' '[:upper:]' <<< "${diff:0:1}")${diff:1}"
              echo "## $title"
              echo

              find "leetcode/$diff" -mindepth 1 -maxdepth 1 -type d -printf "%f\n" | sort | while read -r name; do
                echo "- [$name]($diff/$name)"
              done

              echo
            done
          } > leetcode/README.md

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          BRANCH="${GITHUB_REF_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: organize LeetHub problems by difficulty"

          git fetch origin "${BRANCH}"
          git pull --rebase origin "${BRANCH}" || {
            echo "Rebase failed"
            git rebase --abort || true
            exit 1
          }

          git push origin HEAD:"${BRANCH}"
