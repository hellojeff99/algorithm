name: Move LeetHub Files

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  move-leethub-files:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Move root LeetHub folders into leetcode by difficulty (overwrite mode)
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p leetcode/easy leetcode/medium leetcode/hard
          shopt -s nullglob

          moved=0

          for path in */; do
            dir="${path%/}"

            case "$dir" in
              .git|.github|leetcode|백준|baekjoon|programmers|프로그래머스|swea|goorm|구름|src|docs|scripts|assets|test|tests)
                continue
                ;;
            esac

            # 루트에 생긴 숫자 시작 폴더만 대상
            [[ "$dir" =~ ^[0-9] ]] || continue

            # README 확인
            [[ -f "$dir/README.md" ]] || continue

            # LeetCode 문제인지 확인
            grep -qi 'leetcode\.com/problems/' "$dir/README.md" || continue

            target_base=""

            # 난이도 판별
            if grep -qiE 'difficulty[^[:alpha:]]*easy|##[[:space:]]*easy|^[[:space:]-]*easy[[:space:]]*$' "$dir/README.md"; then
              target_base="leetcode/easy"
            elif grep -qiE 'difficulty[^[:alpha:]]*medium|##[[:space:]]*medium|^[[:space:]-]*medium[[:space:]]*$' "$dir/README.md"; then
              target_base="leetcode/medium"
            elif grep -qiE 'difficulty[^[:alpha:]]*hard|##[[:space:]]*hard|^[[:space:]-]*hard[[:space:]]*$' "$dir/README.md"; then
              target_base="leetcode/hard"
            else
              echo "Skip: difficulty not detected for $dir"
              continue
            fi

            target_dir="$target_base/$dir"

            echo "Processing $dir -> $target_dir"

            # overwrite mode
            if [[ -d "$target_dir" ]]; then
              echo "Overwrite: removing existing $target_dir"
              rm -rf "$target_dir"
              git add -A
            fi

            git mv "$dir" "$target_dir" || mv "$dir" "$target_dir"
            moved=1
          done

          if [[ "$moved" -eq 0 ]]; then
            echo "No LeetHub folders matched."
          fi

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: organize LeetHub problems by difficulty"
          git push
